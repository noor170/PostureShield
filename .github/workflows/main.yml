name: Build Posture Shield APK
on: [push, pull_request]

env:
  # Opt-in to Node24 as required by the May 2026 migration period
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    # Use Ubuntu 24.04 so runner actions execute with Node 24 compatibility
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Quotes are mandatory to prevent 3.10 from being read as 3.1
          python-version: '3.10'

      - name: Build APK with Buildozer
        # Using a stable community builder to avoid repository resolution errors
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: '3.10'
          buildozer-cmd: buildozer -v android debug


      - name: Upload Artifacts
        # Updated to v4 to comply with 2026 storage requirements
        uses: actions/upload-artifact@v4
        with:
          name: PostureShield-Android
          path: bin/*.apk