name: Build Posture Shield APK
on: [push, pull_request]

jobs:
  build:
    # Force Ubuntu 22.04 to ensure Python 3.10 is available
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK with Buildozer
        # Using a verified accessible builder path
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: 3.10
          buildozer-cmd: buildozer -v android debug

