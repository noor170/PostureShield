name: Build Posture Shield APK
on: [push, pull_request]

env:
  # Mandatory for 2026 builds to resolve Node.js 20/24 conflicts
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Use 22.04 as it is the most stable for Android NDK/Buildozer
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Must use quotes to prevent 3.10 from being read as 3.1
          python-version: '3.10'

