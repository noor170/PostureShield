name: Build Posture Shield
on: [push, pull_request, workflow_dispatch]

env:
  # Opt-in to Node24 as required by the May 2026 migration period
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  build:
    # Buildozer is more reliable here when installed directly instead of through a third-party composite action.
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ANDROIDAPI: '34'
      ANDROIDMINAPI: '21'
      ANDROIDNDK: '25b'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Quotes are mandatory to prevent 3.10 from being read as 3.1
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            ninja-build \
            build-essential \
            libffi-dev \
            libssl-dev

      - name: Accept Android SDK licenses
        run: |
          export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
          if command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager --licenses || true
          fi

      - name: Build APK with Buildozer
        run: buildozer -v android debug


      - name: Upload Artifacts
        # Updated to v4 to comply with 2026 storage requirements
        uses: actions/upload-artifact@v6
        with:
          name: PostureShield-Android
          path: bin/*.apk
          if-no-files-found: error

  qodana:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: ${{ github.event_name == 'pull_request' }}
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          upload-result: true
          push-fixes: 'none'
