name: Build Posture Shield
on: [push, pull_request, workflow_dispatch]

env:
  # Opt-in to Node24 as required by the May 2026 migration period
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  build:
    # digreatbrian/buildozer-action@v2 installs libtinfo5, which is not available on Ubuntu 24.04
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Quotes are mandatory to prevent 3.10 from being read as 3.1
          python-version: '3.11'

      - name: Build APK with Buildozer
        # Using a stable community builder to avoid repository resolution errors
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: '3.10'
          buildozer-cmd: buildozer -v android debug


      - name: Upload Artifacts
        # Updated to v4 to comply with 2026 storage requirements
        uses: actions/upload-artifact@v6
        with:
          name: PostureShield-Android
          path: bin/*.apk
          if-no-files-found: error

  qodana:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: ${{ github.event_name == 'pull_request' }}
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          upload-result: true
          push-fixes: 'none'
