name: Build Posture Shield APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4[cite: 1]

      - name: Build with Buildozer
        # This is the official path for the Kivy Buildozer Action
        uses: kivy/buildozer-action@master[cite: 5]
        with:
          save_build_dir: true

      - name: Upload APK
        uses: actions/upload-artifact@v4[cite: 1]
        with:
          name: PostureShield-Android
          path: bin/*.apk
